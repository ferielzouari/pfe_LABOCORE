server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path serves index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api calls to the Spring Boot backend
    # The service name "backend" matches the docker-compose service name
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
