server:
  port: 8080
  compression:
    enabled: false

spring:
  application:
    name: labocore

  datasource:
    url: "jdbc:sqlserver://localhost:1433;databaseName=glabo;encrypt=true;trustServerCertificate=true"
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: sa
    password: 123

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: dbo

  h2:
    console:
      enabled: false

logging:
  level:
    com.clinisys.labocore: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.type.descriptor.sql: TRACE